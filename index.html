<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://i.imgur.com/JOLSIF3.png">
    <title>Quinti - Professor de Inglês</title>
    <meta name="cross-origin-embedder-policy" content="require-corp">
    <meta name="cross-origin-opener-policy" content="same-origin">
    <link rel="stylesheet" href="src/style.css">
    <script src="https://cdn.jsdelivr.net/npm/jsllm7/jsllm7.js"></script>
</head>
<body>
    <div class="container">
        <div class="topo">
            <div class="avatar">
                <img src="https://i.imgur.com/JOLSIF3.png" alt="Quinti">
            </div>
            <div class="info-topo">
                <div class="titulo">Quinti ✨</div>
                <div id="status">🌍 Quinti is Ready!</div>
            </div>
            <div class="progress-container">
                <div id="progress" class="progress-bar"></div>
            </div>
        </div>

        <div id="chat" class="chat">
            <div class="loading">
                🌍<br>
                Estou sempre abrindo os meus livros...
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="pergunta" placeholder="Ex: como se diz gato em inglês?">
            <button id="btnEnviar" type="button">Enviar ✨</button>
            <button id="btnSpeaker" type="button">🔊</button>   <!-- BOTÃO DO ALTO-FALANTE -->
            <button id="btnMic" type="button">🎤</button>
        </div>
    </div>

    <script type="module" src="src/app.js"></script>
</body>
</html>
