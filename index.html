<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quinti 🌍</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#e0f2fe;
  font-family:Arial, sans-serif;

  display:flex;
  justify-content:center;
  align-items:center;

  height:100vh;
}

.chat-container{

  width:100%;
  max-width:850px;
  height:95vh;

  background:white;

  border-radius:20px;

  overflow:hidden;

  box-shadow:0 0 20px rgba(0,0,0,0.1);

  display:flex;
  flex-direction:column;
}

.topo{

  background:#60a5fa;

  color:white;

  padding:20px;

  display:flex;

  align-items:center;

  gap:15px;
}

.avatar{

  width:70px;

  height:70px;

  border-radius:50%;

  border:3px solid white;

  object-fit:cover;

  background:white;
}

.info-topo{

  display:flex;

  flex-direction:column;
}

.titulo{

  font-size:24px;

  font-weight:bold;
}

.subtitulo{

  font-size:14px;

  opacity:0.9;

  margin-top:4px;
}

#chat{

  flex:1;

  overflow-y:auto;

  padding:20px;

  background:#f8fafc;
}

.msg{

  padding:14px;

  border-radius:14px;

  margin-bottom:14px;

  max-width:80%;

  line-height:1.5;

  animation:aparecer 0.3s ease;
}

@keyframes aparecer{

  from{
    opacity:0;
    transform:translateY(10px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

.user{

  background:#2563eb;

  color:white;

  margin-left:auto;
}

.bot{

  background:white;

  border:1px solid #ddd;
}

.pensando{

  color:#666;

  font-style:italic;

  margin-bottom:15px;

  display:flex;

  align-items:center;

  gap:10px;

  animation:pulse 1s infinite;
}

@keyframes pulse{

  0%{
    opacity:0.5;
  }

  50%{
    opacity:1;
  }

  100%{
    opacity:0.5;
  }
}

.pensando img{

  width:40px;

  height:40px;

  border-radius:50%;
}

.entrada{

  display:flex;

  gap:10px;

  padding:15px;

  background:white;

  border-top:1px solid #ddd;
}

input{

  flex:1;

  padding:14px;

  border-radius:12px;

  border:1px solid #ccc;

  font-size:16px;
}

button{

  padding:14px 20px;

  border:none;

  border-radius:12px;

  background:#34d399;

  color:white;

  cursor:pointer;

  font-size:16px;
}

button:hover{

  opacity:0.9;
}

</style>

</head>

<body>

<div class="chat-container">

  <div class="topo">

    <img
      class="avatar"
      src="https://i.imgur.com/oAteJWd.png"
    >

    <div class="info-topo">

      <div class="titulo">
        🌍 Quinti
      </div>

      <div class="subtitulo">
        English for curious kids from Osasco ✨
      </div>

    </div>

  </div>

  <div id="chat"></div>

  <div class="entrada">

    <input
      id="pergunta"
      placeholder="Type in English..."
    >

    <button onclick="enviar()">
      Send
    </button>

  </div>

</div>

<script type="module">

import * as webllm from "https://esm.run/@mlc-ai/web-llm";

const engine = new webllm.MLCEngine();

const chat = document.getElementById("chat");

const input = document.getElementById("pergunta");


// ENTER envia mensagem
input.addEventListener("keypress", function(event){

  if(event.key === "Enter"){

    enviar();
  }

});


// CARREGA MODELO LEVE
async function iniciarModelo(){

  mostrarMensagemSistema(
    "🌍 Quinti está acordando..."
  );

  try{

    await engine.reload(
      "TinyLlama-1.1B-Chat-v0.4-q4f16_1"
    );

    mostrarMensagemSistema(
      "✅ Quinti está pronto para conversar!"
    );

  }catch(err){

    mostrarMensagemSistema(
      "❌ O computador ficou sem força para carregar o Quinti."
    );

    console.error(err);
  }
}


// MOSTRA MENSAGEM DO SISTEMA
function mostrarMensagemSistema(texto){

  const div = document.createElement("div");

  div.className = "msg bot";

  div.innerHTML = texto;

  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;
}


// MOSTRA "PENSANDO"
function mostrarPensando(){

  removerPensando();

  const div = document.createElement("div");

  div.className = "pensando";

  div.id = "pensando";

  div.innerHTML = `
  
    <img src="https://i.imgur.com/oAteJWd.png">

    <span>
      🧠 Quinti está pensando...
    </span>
  
  `;

  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;
}


// REMOVE "PENSANDO"
function removerPensando(){

  const pensando = document.getElementById("pensando");

  if(pensando){

    pensando.remove();
  }
}


// ENVIA MENSAGEM
window.enviar = async function(){

  const pergunta = input.value.trim();

  if(!pergunta){
    return;
  }

  // mensagem usuário
  const userDiv = document.createElement("div");

  userDiv.className = "msg user";

  userDiv.innerHTML = pergunta;

  chat.appendChild(userDiv);

  chat.scrollTop = chat.scrollHeight;

  input.value = "";

  // MOSTRA pensando
  mostrarPensando();

  try{

    // chama IA
    const resposta =
      await engine.chat.completions.create({

        messages:[

          {
            role:"system",
            content:`
Você é Quinti.

Professor infantil de inglês.

Ensine crianças de 7 a 9 anos.

Use:
- frases simples
- respostas curtas
- exemplos fáceis
- emojis leves
- tom amigável
`
          },

          {
            role:"user",
            content:pergunta
          }

        ],

        temperature:0.7,

        max_tokens:80

      });

    // REMOVE pensando
    removerPensando();

    // resposta IA
    const botDiv =
      document.createElement("div");

    botDiv.className = "msg bot";

    botDiv.innerHTML =
      resposta.choices[0].message.content;

    chat.appendChild(botDiv);

    chat.scrollTop = chat.scrollHeight;

  }catch(err){

    removerPensando();

    const erroDiv =
      document.createElement("div");

    erroDiv.className = "msg bot";

    erroDiv.innerHTML =
      "❌ Quinti ficou cansado. Tente novamente.";

    chat.appendChild(erroDiv);

    console.error(err);
  }

}


// INICIA
iniciarModelo();

</script>

</body>
</html>
