<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quinti 🌍</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#e0f2fe;
  font-family:Arial, sans-serif;

  display:flex;
  justify-content:center;
  align-items:center;

  height:100vh;
}

.chat-container{

  width:100%;
  max-width:850px;
  height:95vh;

  background:white;

  border-radius:20px;

  overflow:hidden;

  box-shadow:0 0 20px rgba(0,0,0,0.1);

  display:flex;
  flex-direction:column;
}

.topo{

  background:#60a5fa;

  color:white;

  padding:20px;

  display:flex;

  align-items:center;

  gap:15px;
}

.avatar{

  width:70px;

  height:70px;

  border-radius:50%;

  border:3px solid white;

  object-fit:cover;

  background:white;
}

.info-topo{

  display:flex;

  flex-direction:column;
}

.titulo{

  font-size:24px;

  font-weight:bold;
}

.subtitulo{

  font-size:14px;

  opacity:0.9;

  margin-top:4px;
}

#chat{

  flex:1;

  overflow-y:auto;

  padding:20px;

  background:#f8fafc;
}

.msg{

  padding:14px;

  border-radius:14px;

  margin-bottom:14px;

  max-width:80%;

  line-height:1.5;

  animation:aparecer 0.3s ease;
}

@keyframes aparecer{

  from{
    opacity:0;
    transform:translateY(10px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

.user{

  background:#2563eb;

  color:white;

  margin-left:auto;
}

.bot{

  background:white;

  border:1px solid #ddd;
}

.pensando{

  color:#666;

  font-style:italic;

  margin-bottom:15px;

  display:flex;

  align-items:center;

  gap:10px;

  animation:pulse 1s infinite;
}

@keyframes pulse{

  0%{
    opacity:0.5;
  }

  50%{
    opacity:1;
  }

  100%{
    opacity:0.5;
  }
}

.pensando img{

  width:40px;

  height:40px;

  border-radius:50%;
}

.entrada{

  display:flex;

  gap:10px;

  padding:15px;

  background:white;

  border-top:1px solid #ddd;
}

input{

  flex:1;

  padding:14px;

  border-radius:12px;

  border:1px solid #ccc;

  font-size:16px;
}

button{

  padding:14px 20px;

  border:none;

  border-radius:12px;

  background:#34d399;

  color:white;

  cursor:pointer;

  font-size:16px;
}

button:hover{

  opacity:0.9;
}

</style>

</head>

<body>

<div class="chat-container">

  <div class="topo">

    <img
      class="avatar"
      src="./img/quintin.png"
    >
  
    <div class="info-topo">

      <div class="titulo">
        🌍 Quinti
      </div>

      <div class="subtitulo">
        English for curious kids from Osasco ✨
      </div>

    </div>

  </div>

  <div id="chat"></div>

  <div class="entrada">

    <input
      id="pergunta"
      placeholder="Type in English..."
    >

    <button onclick="enviar()">
      Send
    </button>

  </div>

</div>

<script type="module">

import * as webllm from "https://esm.sh/@mlc-ai/web-llm";

const chat =
  document.getElementById("chat");

const input =
  document.getElementById("pergunta");

let memoria = [];

let engine = null;


// MODELO MAIS LEVE
const MODEL =
  "SmolLM-1.7B-Instruct-q4f16_1-MLC";


// ========= LISTA DE JSON =========
const arquivos = [

  // Conversação
  "food_and_drink.json",
  "historia_lingua_inglesa.json",
  "lets_have_fun.json",
  "places_to_go_in_town.json",
  "prepositions_in_on_at.json",
  "pronomes.json",
  "verb_to_be.json",
  "we_are_having_fun.json",
  "where_can_we_buy_clothes.json",
  "where_can_we_find_it.json",
  "where_is_the_candy_shop.json",

  // Vocabulário
  "adjetivos.json",
  "animais_fazenda.json",
  "animais_marinhos.json",
  "animais_selvagens.json",
  "aniversario_expressoes.json",
  "clima.json",
  "comidas.json",
  "cores.json",
  "cumprimentos.json",
  "curiosidades_lingua_inglesa.json",
  "dias_da_semana.json",
  "estacoes.json",
  "fases_da_vida.json",
  "glossario.json",
  "halloween.json",
  "horas.json",
  "materias_escolares.json",
  "meses_do_ano.json",
  "numeros_ordinais.json",
  "o_que_e_lingua_inglesa.json",
  "objetos_escolares.json",
  "opostos.json",
  "passaros.json",
  "pequenos_dialogos.json",
  "rotinas.json",
  "roupas.json",
  "sinonimos.json",
  "substantivos.json",
  "datas_comemorativas_ingles.json"

];
// =================================


let conhecimento = {};


// ENTER envia
input.addEventListener("keypress", function(event){

  if(event.key === "Enter"){

    enviar();
  }

});


// MENSAGEM
function adicionarMensagem(texto, classe){

  const div =
    document.createElement("div");

  div.className =
    "msg " + classe;

  div.innerText = texto;

  chat.appendChild(div);

  chat.scrollTop =
    chat.scrollHeight;
}


// PENSANDO
function mostrarPensando(){

  removerPensando();

  const div =
    document.createElement("div");

  div.className = "pensando";

  div.id = "pensando";

  div.innerHTML = `
  
  <img src="./img/quintin.png">

  <span>
    🧠 Quinti está pensando...
  </span>

`;

  chat.appendChild(div);

  chat.scrollTop =
    chat.scrollHeight;
}


// REMOVE PENSANDO
function removerPensando(){

  const pensando =
    document.getElementById("pensando");

  if(pensando){

    pensando.remove();
  }
}


// CARREGAR JSONS
async function carregarConhecimento(){

  for(const arquivo of arquivos){

    try{

      const resposta =
        await fetch(`./dados/${arquivo}`);

      if(!resposta.ok){
        continue;
      }

      const json =
        await resposta.json();

      conhecimento = {

        ...conhecimento,

        ...json
      };

    }catch(e){

      console.warn(
        `Erro ao carregar ${arquivo}`,
        e
      );
    }
  }
}


// INICIAR
async function iniciar(){

  adicionarMensagem(
    "📚 Quinti está abrindo os livrinhos...",
    "bot"
  );

  try{

    // CARREGA JSONS
    await carregarConhecimento();

    adicionarMensagem(
      "🧠 Quinti está carregando o cérebro...",
      "bot"
    );

    // INICIA WEBLLM
    engine =
      new webllm.MLCEngine();

    await engine.reload(MODEL);

    chat.innerHTML = "";

    adicionarMensagem(
      "Hello! I'm Quinti!",
      "bot"
    );

  }catch(err){

    adicionarMensagem(
      "❌ Seu navegador não conseguiu iniciar o Quinti.",
      "bot"
    );

    console.error(err);
  }

}


// ENVIAR
window.enviar = async function(){

  const pergunta =
    input.value.trim();

  if(!pergunta){
    return;
  }

  adicionarMensagem(
    pergunta,
    "user"
  );

  memoria.push({

    role:"user",

    content:pergunta

  });

  input.value = "";

  mostrarPensando();

  // CONTEXTO DOS JSONS
  let contexto = "";

  for(const chave in conhecimento){

    if(

      pergunta
        .toLowerCase()
        .includes(
          chave.toLowerCase()
        )

    ){

      contexto += `
Word: ${chave}
Meaning: ${conhecimento[chave]}
`;

    }
  }

  // SYSTEM PROMPT
  const systemPrompt = `

You are Quinti 🌍

You are ONLY Quinti.
You are NOT an AI assistant.
Never say you are an AI.
Never break character.
Always act like a children's English teacher.

You are a Brazilian elementary English teacher
for children aged 7 to 9.

IMPORTANT RULES:

- Teach basic English only.
- Always answer like a calm teacher.
- Never speak like a teenager.
- Never use slang.
- Never use internet expressions.
- Never invent conversations.
- Never ignore the child's question.
- Always help in Portuguese when necessary.
- Use short answers.
- Teach step by step.
- Use simple vocabulary.
- Use at most 1 emoji sometimes.

VERY IMPORTANT:

If the child asks:
"como se diz X em inglês"
or
"o que é X em inglês"

Always answer in this format:

English word ✨

English word = tradução

Example:
Simple sentence.

GOOD EXAMPLES:

Child:
dog

Answer:
Dog 🐶

Dog = cachorro

Example:
I like dogs.

---

Child:
como se diz vaca em inglês

Answer:
Cow 🐄

Cow = vaca

Example:
The cow is big.

IMPORTANT:
Never ask about family.
Never invent personal questions.
Never behave like social media.
Stay focused on English teaching only.

`;

  const userMessage = `

Context:
${contexto || "No context"}

Child:
${pergunta}

Quinti:

`;

  try {

    const resposta =
      await engine.chat.completions.create({

        messages: [

          {
            role: "system",
            content: systemPrompt
          },

          {
            role: "user",
            content: userMessage
          }

        ],

        temperature: 0.7,

        max_tokens: 300

      });

    const texto =
      resposta
        .choices[0]
        .message
        .content
        .trim();

    removerPensando();

    adicionarMensagem(
      texto,
      "bot"
    );

    memoria.push({

      role:"assistant",

      content:texto

    });

  } catch (err) {

    removerPensando();

    console.error(err);

    adicionarMensagem(
      "❌ Quinti não conseguiu pensar localmente.",
      "bot"
    );
  }

}


// INICIAR APP
iniciar();

</script>

</body>
</html>
