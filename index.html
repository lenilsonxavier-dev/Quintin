<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quinti 🌍</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#e0f2fe;
  font-family:Arial, sans-serif;

  display:flex;
  justify-content:center;
  align-items:center;

  height:100vh;
}

.chat-container{

  width:100%;
  max-width:850px;
  height:95vh;

  background:white;

  border-radius:20px;

  overflow:hidden;

  box-shadow:0 0 20px rgba(0,0,0,0.1);

  display:flex;
  flex-direction:column;
}

.topo{

  background:#60a5fa;

  color:white;

  padding:20px;

  display:flex;

  align-items:center;

  gap:15px;
}

.avatar{

  width:70px;

  height:70px;

  border-radius:50%;

  border:3px solid white;

  object-fit:cover;

  background:white;
}

.info-topo{

  display:flex;

  flex-direction:column;
}

.titulo{

  font-size:24px;

  font-weight:bold;
}

.subtitulo{

  font-size:14px;

  opacity:0.9;

  margin-top:4px;
}

#chat{

  flex:1;

  overflow-y:auto;

  padding:20px;

  background:#f8fafc;
}

.msg{

  padding:14px;

  border-radius:14px;

  margin-bottom:14px;

  max-width:80%;

  line-height:1.5;

  animation:aparecer 0.3s ease;
}

@keyframes aparecer{

  from{
    opacity:0;
    transform:translateY(10px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

.user{

  background:#2563eb;

  color:white;

  margin-left:auto;
}

.bot{

  background:white;

  border:1px solid #ddd;
}

.pensando{

  color:#666;

  font-style:italic;

  margin-bottom:15px;

  display:flex;

  align-items:center;

  gap:10px;

  animation:pulse 1s infinite;
}

@keyframes pulse{

  0%{
    opacity:0.5;
  }

  50%{
    opacity:1;
  }

  100%{
    opacity:0.5;
  }
}

.pensando img{

  width:40px;

  height:40px;

  border-radius:50%;
}

.entrada{

  display:flex;

  gap:10px;

  padding:15px;

  background:white;

  border-top:1px solid #ddd;
}

input{

  flex:1;

  padding:14px;

  border-radius:12px;

  border:1px solid #ccc;

  font-size:16px;
}

button{

  padding:14px 20px;

  border:none;

  border-radius:12px;

  background:#34d399;

  color:white;

  cursor:pointer;

  font-size:16px;
}

button:hover{

  opacity:0.9;
}

</style>

</head>

<body>

<div class="chat-container">

  <div class="topo">

    <img
      class="avatar"
      src="https://i.imgur.com/oAteJWd.png"
    >

    <div class="info-topo">

      <div class="titulo">
        🌍 Quinti
      </div>

      <div class="subtitulo">
        English for curious kids from Osasco ✨
      </div>

    </div>

  </div>

  <div id="chat"></div>

  <div class="entrada">

    <input
      id="pergunta"
      placeholder="Type in English..."
    >

    <button onclick="enviar()">
      Send
    </button>

  </div>

</div>

<script>

const chat =
  document.getElementById("chat");

const input =
  document.getElementById("pergunta");

let memoria = [];


// ENTER envia
input.addEventListener("keypress", function(event){

  if(event.key === "Enter"){

    enviar();
  }

});


// MENSAGEM
function adicionarMensagem(texto, classe){

  const div =
    document.createElement("div");

  div.className =
    "msg " + classe;

  div.innerText = texto;

  chat.appendChild(div);

  chat.scrollTop =
    chat.scrollHeight;
}


// PENSANDO
function mostrarPensando(){

  removerPensando();

  const div =
    document.createElement("div");

  div.className = "pensando";

  div.id = "pensando";

  div.innerHTML = `
  
    <img src="https://i.imgur.com/oAteJWd.png">

    <span>
      🧠 Quinti está pensando...
    </span>
  
  `;

  chat.appendChild(div);

  chat.scrollTop =
    chat.scrollHeight;
}


// REMOVE PENSANDO
function removerPensando(){

  const pensando =
    document.getElementById("pensando");

  if(pensando){

    pensando.remove();
  }
}


// INICIAR
async function iniciar(){

  adicionarMensagem(
    "🌍 Connecting to GPT4All...",
    "bot"
  );

  try{

    await fetch(
      "http://localhost:4891/v1/models"
    );

    chat.innerHTML = "";

    adicionarMensagem(
      "🌈 Hello! I'm Quinti!",
      "bot"
    );

  }catch(err){

    adicionarMensagem(
      "❌ GPT4All não está aberto.",
      "bot"
    );

    console.error(err);
  }

}


// ENVIAR
window.enviar = async function(){

  const pergunta =
    input.value.trim();

  if(!pergunta){
    return;
  }

  adicionarMensagem(
    pergunta,
    "user"
  );

  memoria.push({

    role:"user",

    content:pergunta

  });

  input.value = "";

  mostrarPensando();

  try{

    const response = await fetch(

      "http://localhost:4891/v1/chat/completions",

      {

        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({

          model:"gpt4all",

          messages:[

            {

              role:"system",

              content:`

You are Quinti 🌍

You are a gentle English teacher
for Brazilian children aged 7.

Use:
- short answers
- simple English
- emojis sometimes
- fun examples
- friendly tone
- easy vocabulary

Never:
- give long explanations
- use difficult grammar
- overwhelm the child

Examples:

Dog 🐶
Dog = cachorro

---

Hello 🌟
Hello = olá

Can you say:
"Hello"?

`

            },

            ...memoria

          ],

          max_tokens:80,

          temperature:0.7

        })

      }

    );

    const resposta =
      await response.json();

    removerPensando();

    const texto =
      resposta
      .choices[0]
      .message
      .content;

    adicionarMensagem(
      texto,
      "bot"
    );

    memoria.push({

      role:"assistant",

      content:texto

    });

  }catch(err){

    removerPensando();

    adicionarMensagem(
      "❌ Quinti não conseguiu responder.",
      "bot"
    );

    console.error(err);
  }

}


// INICIAR APP
iniciar();

</script>

</body>
</html>
