<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://i.imgur.com/hZrlJFb.png">
    <title>Quinti - Professor de Inglês</title>
    <meta name="cross-origin-embedder-policy" content="require-corp">
    <meta name="cross-origin-opener-policy" content="same-origin">
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://i.imgur.com/hZrlJFb.png"
                 alt="Quinti"
                 class="avatar">
            <h1>Quinti ✨</h1>
            <div id="status">🌍 Carregando...</div>
            <progress id="progress" value="0" max="1"></progress>
        </div>

        <div id="chat" class="chat">
            <div class="loading">
                🌍<br>
                Estou abrindo os meus livros...
            </div>
        </div>

        <div class="input-area">
            <input type="text"
                   id="pergunta"
                   placeholder="Ex: como se diz gato em inglês?">
            <button id="btnEnviar" type="button">
                Enviar ✨
            </button>
            <button id="btnMic" type="button">
                🎤
            </button>
        </div>
    </div>

    <script type="module" src="src/app.js"></script>
</body>
</html>
